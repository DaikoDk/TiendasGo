<section class="space-y-6">
  <header class="space-y-2">
    <h1 class="font-headline text-3xl font-extrabold text-on-surface">Usuarios por rol</h1>
    <p class="font-body text-sm text-on-surface-variant">
      Selecciona un rol para ir a una vista diferente de listado.
    </p>
  </header>

  @if (errorMessage().length > 0) {
    <p class="text-sm font-medium text-error" role="alert">{{ errorMessage() }}</p>
  }

  <app-card>
    <h2 class="font-headline text-lg font-bold text-on-surface">Roles activos</h2>

    @if (loadingRoles()) {
      <p class="mt-3 text-sm text-on-surface-variant">Cargando roles...</p>
    } @else {
      <div class="mt-4 flex flex-wrap gap-2">
        @for (rol of roles(); track rol.idRol) {
          <button
            type="button"
            class="rounded-full border border-on-surface/15 bg-surface-container px-4 py-2 text-sm font-semibold text-on-surface transition hover:border-primary/60 hover:text-primary"
            (click)="selectRol(rol)"
          >
            {{ rol.nombre }}
          </button>
        } @empty {
          <p class="text-sm text-on-surface-variant">No hay roles activos disponibles.</p>
        }
      </div>
    }
  </app-card>
</section>
